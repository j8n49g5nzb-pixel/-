<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مجرة حبنا السحرية 🌌💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&family=Reem_Kufi:wght=700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050014;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* حاوية الفضاء والمجرة */
        .universe {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* القلب المشع في المركز */
        .galaxy-core {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #ff0055;
            transform: rotate(45deg);
            box-shadow: 0 0 40px 20px #ff0055, 0 0 80px 40px #ff4d6d;
            border-radius: 4px;
            animation: pulseCore 2s infinite alternate ease-in-out;
            z-index: 1;
            top: 25%; /* رفع السنتر لفوق شوية عشان يسيب مساحة للكارت */
        }
        .galaxy-core::before, .galaxy-core::after {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: #ff0055;
            border-radius: 50%;
        }
        .galaxy-core::before { left: -30px; }
        .galaxy-core::after { top: -30px; }

        @keyframes pulseCore {
            0% { transform: rotate(45deg) scale(0.9); opacity: 0.8; }
            100% { transform: rotate(45deg) scale(1.1); opacity: 1; box-shadow: 0 0 60px 30px #ff0055, 0 0 100px 50px #ff758f; }
        }

        /* حلقة المجرة الدوارة مسطحة ومناسبة للموبايل */
        .galaxy-spiral {
            position: absolute;
            width: 100vw;
            height: 100vw;
            max-width: 500px;
            max-height: 500px;
            top: 5%;
            animation: spinGalaxy 30s linear infinite;
            z-index: 2;
            pointer-events: none; /* عشان تلمس اللي تحتها براحتك */
        }

        @keyframes spinGalaxy {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(-360deg); }
        }

        /* العناصر الطائرة */
        .cosmic-item {
            position: absolute;
            top: 50%;
            left: 50%;
            white-space: nowrap;
            color: #fff;
            text-shadow: 0 0 8px #ff4d6d, 0 0 15px #ff4d6d;
            font-weight: 900;
            opacity: 0.75;
        }

        /* كارت الرسالة المنبثق - تعديل الأبعاد والمكان */
        .message-card {
            position: absolute;
            bottom: 40px; /* مثبت تحت السنتر ومناسب لكل الشاشات */
            background: rgba(15, 5, 25, 0.85);
            border: 2px solid #ff4d6d;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(255, 0, 85, 0.4);
            width: 90%;
            max-width: 360px;
            z-index: 9999; /* أعلى حاجة في الشاشة عشان الزرار يشتغل */
            animation: floatCard 4s infinite alternate ease-in-out;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-10px); }
        }

        .message-card h1 {
            color: #ff4d6d;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 22px;
            margin-bottom: 12px;
        }

        .message-card p {
            font-size: 15px;
            line-height: 1.6;
            color: #f0f0f0;
            margin-bottom: 15px;
            min-height: 72px; /* تثبيت المساحة عشان الكارت ميهزش */
        }

        .message-card .btn {
            background: linear-gradient(45deg, #d90429, #ff4d6d);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            font-family: 'Cairo', sans-serif;
            transition: 0.2s;
            display: inline-block;
            width: 80%;
            -webkit-tap-highlight-color: transparent;
        }

        .message-card .btn:active {
            transform: scale(0.95);
        }

        audio { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop preload="auto">
        <source src="https://archive.org/download/amrdiab_202209/AmrDiab-AgmalEyoun.mp3" type="audio/mpeg">
    </audio>

    <div class="universe">
        <div class="galaxy-core"></div>

        <div class="galaxy-spiral" id="spiral"></div>

        <div class="message-card">
            <h1>مجرّة حبّنا السحرية ✨</h1>
            <p id="card-text">كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖🌌</p>
            <button class="btn" id="next-btn">اضغطي لرؤية المزيد 🚀</button>
        </div>
    </div>

    <script>
        const spiral = document.getElementById('spiral');
        const nextBtn = document.getElementById('next-btn');
        const cardText = document.getElementById('card-text');
        const music = document.getElementById('bg-music');

        const words = [
            "بحبك", "ملوكتي 👑", "حياتي", "يا أجمل عيون", "أنتِ كوني", "فراشتي 🦋", 
            "وتيني", "عشقي", "✨", "💖", "⭐", "❤️", "قمر دنيتي", "أميرتي", "دنيتي كلها"
        ];

        // توزيع الكلمات بشكل حلزوني منسق للموبايل داخل الدائرة
        words.forEach((word, index) => {
            const item = document.createElement('div');
            item.classList.add('cosmic-item');
            item.innerText = word;

            const angle = (index / words.length) * Math.PI * 2;
            const radius = 60 + (index * 9); // تقليص القطر ليناسب شاشة الموبايل ولا يخرج عنها

            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            item.style.transform = `translate(${x}px, ${y}px)`;
            item.style.fontSize = `${12 + Math.random() * 6}px`;
            
            spiral.appendChild(item);
        });

        let step = 0;
        
        // دالة تغيير النصوص وتشغيل الموسيقى
        function handleNext() {
            if(music.paused) {
                music.play().then(() => {
                    music.currentTime = 120;
                }).catch(e => console.log("الصوت يحتاج ضغطة مستخدم"));
            }

            step++;
            if (step === 1) {
                cardText.innerHTML = "في كل ركن في المجرة دي، وفى كل نبضة من نبضات قلبي، مفيش غير اسمك أنتِ وبس يا ملوكتي.. ربنا يخليكي ليا يا أحلى عيون في الكون! 💕🦋";
                nextBtn.innerText = "عالمنا الخاص 👑";
            } else if (step === 2) {
                cardText.innerHTML = "مهما لفيت الدنيا ومهما شفت نجوم، هتفضلي أنتِ النجمة الوحيدة اللي منورة سمايا ومخلية دنيتي كلها حب وسعادة.. بعشقك لآخر يوم في عمري! ✨❤️";
                nextBtn.innerText = "إعادة الرحلة 🔄";
                step = -1;
            } else {
                cardText.innerHTML = "كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖🌌";
                nextBtn.innerText = "اضغطي لرؤية المزيد 🚀";
                step = 0;
            }
        }

        // تشغيل الحدث باللمس السريع والضغط العادي لضمان استجابة الأيفون فوراً
        nextBtn.addEventListener('click', handleNext);
    </script>
</body>
</html>
