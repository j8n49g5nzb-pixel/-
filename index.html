<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxia de Amor | النسخة السينمائية الفاخرة بالستيكرات 🌌🧸</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=600;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #02000a;
            font-family: 'Cairo', sans-serif;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* واجهة المستخدم الزجاجية الفاخرة جداً */
        .premium-interface {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            background: rgba(5, 1, 15, 0.7);
            border: 1px solid rgba(255, 77, 109, 0.3);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border-radius: 28px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 0, 85, 0.15);
            z-index: 10;
            animation: spaceFloat 5s infinite alternate ease-in-out;
            border-top-right-radius: 0;
            transition: all 1s ease;
        }

        @keyframes spaceFloat {
            0% { transform: translate(-50%, 0px) rotate(-0.5deg); }
            100% { transform: translate(-50%, -12px) rotate(0.5deg); }
        }

        .premium-interface h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(45deg, #fff, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 1s ease;
        }

        .premium-interface p {
            font-size: 15px;
            line-height: 1.8;
            color: #e5e5e7;
            margin-bottom: 24px;
            min-height: 80px;
            transition: opacity 0.5s ease;
            font-weight: 500;
        }

        .premium-btn {
            background: linear-gradient(135deg, #ff0055, #d90429);
            color: #fff;
            border: none;
            padding: 16px 0;
            width: 90%;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .premium-btn:active {
            transform: scale(0.94);
        }

        audio { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="premium-interface" id="ui-card">
        <h1 id="card-title">مجرّة ملوكة الورديّة 🌌💖</h1>
        <p id="card-text">كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖</p>
        <button class="premium-btn" id="next-btn" onclick="triggerCinematicWarp()">الانتقال للمجرة التالية 🚀</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://archive.org/download/amrdiab_202209/AmrDiab-AgmalEyoun.mp3" type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, starField, mainGalaxy;
        let stickerObjects = [];
        let targetCamPos = { x: 0, y: 150, z: 500 };
        let currentStep = 0;
        
        const container = document.getElementById('canvas-container');
        const music = document.getElementById('bg-music');

        // ألوان المجرات المتغيرة (وردي -> بنفسجي -> فيروزي نيون)
        const galaxyThemes = [
            { c1: '#ff0055', c2: '#7209b7', bg: 0x02000a, title: "مجرّة ملوكة الورديّة 🌌💖" },
            { c1: '#9d4edd', c2: '#3a0ca3', bg: 0x050015, title: "سديم الأرجوان الساحر 🔮✨" },
            { c1: '#00f5d4', c2: '#00bbf9', bg: 0x00050c, title: "بُعد الفيروز اللانهائي 💎🌀" }
        ];

        // روابط صور ستيكرات كيوت عالية الجودة (قلوب، نجوم، دباديب حب كرتونية)
        const stickerUrls = [
            'https://cdn-icons-png.flaticon.com/512/833/833472.png', // قلب أحمر كيوت
            'https://cdn-icons-png.flaticon.com/512/541/541415.png', // دبدوب حب
            'https://cdn-icons-png.flaticon.com/512/1256/1256658.png', // نجمة صفراء تبتسم
            'https://cdn-icons-png.flaticon.com/512/2904/2904973.png', // قطة حب كيوت
            'https://cdn-icons-png.flaticon.com/512/744/744465.png', // كارت حب
            'https://cdn-icons-png.flaticon.com/512/963/963849.png'  // بالونات على شكل قلب
        ];

        function initCinemaEngine() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x02000a, 0.0012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(targetCamPos.x, targetCamPos.y, targetCamPos.z);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            buildDeepSpace();
            buildCinematicGalaxy(galaxyThemes[0].c1, galaxyThemes[0].c2);
            build3DStickers();

            window.addEventListener('resize', onWindowResize);
            renderLoop();
        }

        // 1. توليد النجوم الخلفية متحركة الألوان
        function buildDeepSpace() {
            const starsGeom = new THREE.BufferGeometry();
            const count = 2000;
            const positions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) { positions[i] = (Math.random() - 0.5) * 1800; }
            starsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.3, transparent: true, opacity: 0.5 });
            starField = new THREE.Points(starsGeom, starsMat);
            scene.add(starField);
        }

        // 2. بناء مجرة ذكية تقبل تغيير الألوان ديناميكياً مع كل زوم
        function buildCinematicGalaxy(colorHex1, colorHex2) {
            if(mainGalaxy) scene.remove(mainGalaxy);

            mainGalaxy = new THREE.Group();
            const count = 3000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            const c1 = new THREE.Color(colorHex1);
            const c2 = new THREE.Color(colorHex2);

            for (let i = 0; i < count; i++) {
                const r = Math.pow(Math.random(), 2.3) * 400;
                const arms = 3; 
                const theta = (i % arms) * ((2 * Math.PI) / arms) + r * 0.02;

                positions[i * 3] = Math.cos(theta) * r + (Math.random() - 0.5) * 20;
                positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
                positions[i * 3 + 2] = Math.sin(theta) * r + (Math.random() - 0.5) * 20;

                const mixedColor = c1.clone().lerp(c2, r / 400);
                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 4.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geometry, material);
            mainGalaxy.add(points);
            scene.add(mainGalaxy);
        }

        // 3. تحميل وتوليد الستيكرات الكيوت الطائرة في الفضاء بدلاً من المربعات
        function build3DStickers() {
            const textureLoader = new THREE.TextureLoader();
            
            // إنشاء 40 ستيكر يطير بمسارات عشوائية ممتدة في العمق
            for (let i = 0; i < 40; i++) {
                const randomUrl = stickerUrls[Math.floor(Math.random() * stickerUrls.length)];
                
                textureLoader.load(randomUrl, (texture) => {
                    const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.9 });
                    const sprite = new THREE.Sprite(material);
                    
                    // توزيع الستيكرات في الفضاء
                    sprite.position.set(
                        (Math.random() - 0.5) * 500,
                        (Math.random() - 0.5) * 300,
                        (Math.random() - 0.5) * 1000
                    );
                    
                    // حجم الستيكر الكيوت المظبوط
                    const scale = 20 + Math.random() * 20;
                    sprite.scale.set(scale, scale, 1);
                    
                    // إضافة بيانات مخصصة للسرعة والدوران العشوائي لكل ستيكر
                    sprite.userData = {
                        speedZ: 1.2 + Math.random() * 1.5,
                        rotSpeed: (Math.random() - 0.5) * 0.02
                    };

                    stickerObjects.push(sprite);
                    scene.add(sprite);
                });
            }
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);

            if(mainGalaxy) mainGalaxy.rotation.y -= 0.002;
            if(starField) starField.rotation.y += 0.0002;
            
            // تحريك وتدوير الستيكرات الكيوت نحو الكاميرا باستمرار لإعطاء إحساس الفيلم السينمائي المذهل
            stickerObjects.forEach(sprite => {
                sprite.position.z += sprite.userData.speedZ;
                sprite.rotation.z += sprite.userData.rotSpeed;
                
                // إذا عبر الستيكر الشاشة وعاد لخلف الكاميرا، نعيد توليده في العمق بالداخل
                if(sprite.position.z > 600) {
                    sprite.position.z = -600;
                    sprite.position.x = (Math.random() - 0.5) * 500;
                    sprite.position.y = (Math.random() - 0.5) * 300;
                }
            });

            // انسيابية الكاميرا الاحترافية فائقة النعومة
            camera.position.x += (targetCamPos.x - camera.position.x) * 0.05;
            camera.position.y += (targetCamPos.y - camera.position.y) * 0.05;
            camera.position.z += (targetCamPos.z - camera.position.z) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        // 4. دالة الانتقال الفضائي الفاخر وتغيير المجرات والألوان مع الزوم
        function triggerCinematicWarp() {
            if(music.paused) {
                music.play().then(() => { music.currentTime = 120; }).catch(e => {});
            }

            currentStep = (currentStep + 1) % galaxyThemes.length;
            const theme = galaxyThemes[currentStep];

            const textEl = document.getElementById('card-text');
            const titleEl = document.getElementById('card-title');
            const btnEl = document.getElementById('next-btn');
            const uiCard = document.getElementById('ui-card');

            textEl.style.opacity = 0;

            // الخدعة السينمائية: زوم طيران سريع جداً لداخل ثقب المجرة (Warp Effect)
            targetCamPos = { x: 0, y: 0, z: -100 };
            
            setTimeout(() => {
                // تغيير محتوى النصوص حسب رقم المجرة والكوكب الحالي
                if (currentStep === 1) {
                    titleEl.innerText = theme.title;
                    textEl.innerHTML = "في كل ركن في المجرة دي، وفي كل نبضة من نبضات قلبي، مفيش غير اسمك وبس.. ربنا يخليكي ليا يا أحلى عيون في الكون كله! 💕🦋";
                    btnEl.innerText = "التحليق للمجرة الفيروزية 🌀";
                    
                    // لقطة كاميرا مائلة ومختلفة للمجرة الثانية
                    targetCamPos = { x: 280, y: 220, z: 350 };
                    uiCard.style.borderColor = "rgba(157, 78, 221, 0.6)";
                    uiCard.style.boxShadow = "0 30px 70px rgba(0, 0, 0, 0.8), 0 0 50px rgba(157, 78, 221, 0.3)";
                } else if (currentStep === 2) {
                    titleEl.innerText = theme.title;
                    textEl.innerHTML = "مهما لفيت الدنيا ومهما شفت نجوم، هيفضل مكانك فوق عالي ومنور دنيتي.. مخلية حياتي كلها حب وسعادة، بعشقك لآخر يوم في عمري! ✨❤️";
                    btnEl.innerText = "العودة لمركز الكون الرئيسي 👑";
                    
                    // لقطة كاميرا علوية فائقة العمق للمجرة الثالثة النيون
                    targetCamPos = { x: -150, y: 350, z: 250 };
                    uiCard.style.borderColor = "rgba(0, 245, 212, 0.6)";
                    uiCard.style.boxShadow = "0 30px 70px rgba(0, 0, 0, 0.8), 0 0 50px rgba(0, 245, 212, 0.3)";
                } else {
                    titleEl.innerText = theme.title;
                    textEl.innerHTML = "كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖";
                    btnEl.innerText = "الانتقال للمجرة التالية 🚀";
                    
                    targetCamPos = { x: 0, y: 150, z: 500 };
                    uiCard.style.borderColor = "rgba(255, 77, 109, 0.3)";
                    uiCard.style.boxShadow = "0 30px 70px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255, 0, 85, 0.15)";
                }

                // إعادة بناء ألوان وأجواء المجرة الجديدة والضباب فوراً أثناء الطيران
                buildCinematicGalaxy(theme.c1, theme.c2);
                renderer.setClearColor(theme.bg);
                scene.fog.color.setHex(theme.bg);

                textEl.style.opacity = 1;
            }, 600);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = initCinemaEngine;
    </script>
</body>
</html>
