<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxia de Amor | المجرة الواقعية الفاخرة 🌌❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=600;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010006;
            font-family: 'Cairo', sans-serif;
        }

        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .premium-interface {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 400px;
            background: rgba(3, 1, 10, 0.75);
            border: 1px solid rgba(255, 77, 109, 0.35);
            backdrop-filter: blur(35px) saturate(200%);
            -webkit-backdrop-filter: blur(35px) saturate(200%);
            border-radius: 28px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 0 0 50px rgba(255, 0, 85, 0.2);
            z-index: 10;
            animation: spaceFloat 5s infinite alternate ease-in-out;
            border-top-right-radius: 0;
            transition: all 1s ease;
        }

        @keyframes spaceFloat {
            0% { transform: translate(-50%, 0px) rotate(-0.5deg); }
            100% { transform: translate(-50%, -12px) rotate(0.5deg); }
        }

        .premium-interface h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 12px;
            background: linear-gradient(45deg, #fff, #ff4d6d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: all 1s ease;
        }

        .premium-interface p {
            font-size: 15px;
            line-height: 1.8;
            color: #e5e5e7;
            margin-bottom: 24px;
            min-height: 80px;
            transition: opacity 0.5s ease;
            font-weight: 500;
        }

        .premium-btn {
            background: linear-gradient(135deg, #ff0055, #d90429);
            color: #fff;
            border: none;
            padding: 16px 0;
            width: 90%;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.45);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .premium-btn:active {
            transform: scale(0.94);
        }

        audio { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="premium-interface" id="ui-card">
        <h1 id="card-title">مجرّة ملوكة الورديّة 🌌💖</h1>
        <p id="card-text">كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖</p>
        <button class="premium-btn" id="next-btn" onclick="triggerCinematicWarp()">الانتقال للمجرة التالية 🚀</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://archive.org/download/amrdiab_202209/AmrDiab-AgmalEyoun.mp3" type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, starField, mainGalaxy;
        let stickerObjects = [];
        let targetCamPos = { x: 0, y: 160, z: 520 };
        let currentStep = 0;
        
        const container = document.getElementById('canvas-container');
        const music = document.getElementById('bg-music');

        const galaxyThemes = [
            { c1: '#ff0055', c2: '#4a00e0', bg: 0x02000c, title: "مجرّة ملوكة الورديّة 🌌💖" },
            { c1: '#8e2de2', c2: '#4a00e0', bg: 0x040014, title: "سديم الأرجوان الساحر 🔮✨" },
            { c1: '#00f2fe', c2: '#4facfe', bg: 0x00040f, title: "بُعد الفيروز اللانهائي 💎🌀" }
        ];

        const trendingLoveUrls = [
            'https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=150&auto=format&fit=crop&q=80',
            'https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=150&auto=format&fit=crop&q=80',
            'https://cdn-icons-png.flaticon.com/512/3656/3656836.png',
            'https://images.unsplash.com/photo-1494774157365-9e04c6720e47?w=150&auto=format&fit=crop&q=80',
            'https://cdn-icons-png.flaticon.com/512/4214/4214065.png',
            'https://images.unsplash.com/photo-1529634806980-85c3dd6d34ac?w=150&auto=format&fit=crop&q=80'
        ];

        function initCinemaEngine() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x02000c, 0.001);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 3000);
            camera.position.set(targetCamPos.x, targetCamPos.y, targetCamPos.z);

            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance", alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            container.appendChild(renderer.domElement);

            buildDeepSpace();
            buildRealisticGalaxy(galaxyThemes[0].c1, galaxyThemes[0].c2);
            buildTrendyStickers();

            window.addEventListener('resize', onWindowResize);
            renderLoop();
        }

        function buildDeepSpace() {
            const starsGeom = new THREE.BufferGeometry();
            const count = 4000;
            const positions = new Float32Array(count * 3);
            for(let i=0; i<count*3; i++) { positions[i] = (Math.random() - 0.5) * 2000; }
            starsGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0.8 });
            starField = new THREE.Points(starsGeom, starsMat);
            scene.add(starField);
        }

        function buildRealisticGalaxy(colorHex1, colorHex2) {
            if(mainGalaxy) scene.remove(mainGalaxy);

            mainGalaxy = new THREE.Group();
            const count = 12000; 
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            const c1 = new THREE.Color(colorHex1);
            const c2 = new THREE.Color(colorHex2);

            for (let i = 0; i < count; i++) {
                const r = Math.pow(Math.random(), 1.8) * 450;
                const arms = 2; 
                const theta = (i % arms) * (Math.PI) + r * 0.03;

                const spreadX = (Math.pow(Math.random(), 2) * (Math.random() < 0.5 ? 1 : -1)) * 40;
                const spreadZ = (Math.pow(Math.random(), 2) * (Math.random() < 0.5 ? 1 : -1)) * 40;

                positions[i * 3] = Math.cos(theta) * r + spreadX;
                positions[i * 3 + 1] = (Math.random() - 0.5) * (35 * (1 - r/450)); 
                positions[i * 3 + 2] = Math.sin(theta) * r + spreadZ;

                const mixedColor = c1.clone().lerp(c2, r / 450);
                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.85,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geometry, material);
            mainGalaxy.add(points);
            scene.add(mainGalaxy);
        }

        function buildTrendyStickers() {
            const textureLoader = new THREE.TextureLoader();
            
            for (let i = 0; i < 35; i++) {
                const randomUrl = trendingLoveUrls[Math.floor(Math.random() * trendingLoveUrls.length)];
                
                textureLoader.load(randomUrl, (texture) => {
                    const material = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 0.95 });
                    const sprite = new THREE.Sprite(material);
                    
                    sprite.position.set(
                        (Math.random() - 0.5) * 600,
                        (Math.random() - 0.5) * 350,
                        (Math.random() - 0.5) * 1100
                    );
                    
                    const scale = 30 + Math.random() * 20;
                    sprite.scale.set(scale, scale, 1);
                    
                    sprite.userData = {
                        speedZ: 1.2 + Math.random() * 1.5,
                        rotSpeed: (Math.random() - 0.5) * 0.01
                    };

                    stickerObjects.push(sprite);
                    scene.add(sprite);
                });
            }
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);

            if(mainGalaxy) mainGalaxy.rotation.y -= 0.002;
            if(starField) starField.rotation.y += 0.0001;
            
            stickerObjects.forEach(sprite => {
                sprite.position.z += sprite.userData.speedZ;
                sprite.rotation.z += sprite.userData.rotSpeed;
                
                if(sprite.position.z > 550) {
                    sprite.position.z = -550;
                    sprite.position.x = (Math.random() - 0.5) * 600;
                    sprite.position.y = (Math.random() - 0.5) * 350;
                }
            });

            camera.position.x += (targetCamPos.x - camera.position.x) * 0.05;
            camera.position.y += (targetCamPos.y - camera.position.y) * 0.05;
            camera.position.z += (targetCamPos.z - camera.position.z) * 0.05;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function triggerCinematicWarp() {
            if(music.paused) {
                music.play().then(() => { music.currentTime = 120; }).catch(e => {});
            }

            currentStep = (currentStep + 1) % galaxyThemes.length;
            const theme = galaxyThemes[currentStep];

            const textEl = document.getElementById('card-text');
            const titleEl = document.getElementById('card-title');
            const btnEl = document.getElementById('next-btn');
            const uiCard = document.getElementById('ui-card');

            textEl.style.opacity = 0;

            targetCamPos = { x: 0, y: 0, z: -120 };
            
            setTimeout(() => {
                if (currentStep === 1) {
                    titleEl.innerText = theme.title;
                    textEl.innerHTML = "في كل ركن في المجرة دي، وفي كل نبضة من نبضات قلبي، مفيش غير اسمك وبس.. ربنا يخليكي ليا يا أحلى عيون في الكون كله! 💕🦋";
                    btnEl.innerText = "التحليق للمجرة الفيروزية 🌀";
                    
                    targetCamPos = { x: 300, y: 200, z: 380 };
                    uiCard.style.borderColor = "rgba(142, 45, 226, 0.6)";
                    uiCard.style.boxShadow = "0 30px 80px rgba(0, 0, 0, 0.9), 0 0 50px rgba(142, 45, 226, 0.35)";
                } else if (currentStep === 2) {
                    titleEl.innerText = theme.title;
                    textEl.innerHTML = "مهما لفيت الدنيا ومهما شفت نجوم، هيفضل مكانك فوق عالي ومنور دنيتي.. مخلية حياتي كلها حب وسعادة، بعشقك لآخر يوم في عمري! ✨❤️";
                    btnEl.innerText = "العودة لمركز الكون الرئيسي 👑";
                    
                    targetCamPos = { x: -180, y: 380, z: 280 };
                    uiCard.style.borderColor = "rgba(0, 242, 254, 0.6)";
                    uiCard.style.boxShadow = "0 30px 80px rgba(0, 0, 0, 0.9), 0 0 50px rgba(0, 242, 254, 0.35)";
                } else {
                    titleEl.innerText = theme.title;
                    textEl.innerHTML = "كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖";
                    btnEl.innerText = "الانتقال للمجرة التالية 🚀";
                    
                    targetCamPos = { x: 0, y: 160, z: 520 };
                    uiCard.style.borderColor = "rgba(255, 77, 109, 0.35)";
                    uiCard.style.boxShadow = "0 30px 80px rgba(0, 0, 0, 0.9), 0 0 50px rgba(255, 0, 85, 0.2)";
                }

                buildRealisticGalaxy(theme.c1, theme.c2);
                renderer.setClearColor(theme.bg);
                scene.fog.color.setHex(theme.bg);

                textEl.style.opacity = 1;
            }, 600);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = initCinemaEngine;
    </script>
</body>
</html>
