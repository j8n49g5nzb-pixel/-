<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجرة حبنا السحرية 🌌💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;900&family=Reem_Kufi:wght=700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #050014;
            color: #fff;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px; /* لعمل تأثير البعد الثالث الفضائي */
        }

        /* حاوية الفضاء والمجرة */
        .universe {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transform-style: preserve-3d;
        }

        /* القلب المشع في المركز كأنه ثقب أسود للمجرة */
        .galaxy-core {
            position: absolute;
            width: 100px;
            height: 100px;
            background: #ff0055;
            transform: rotate(45deg);
            box-shadow: 0 0 60px 30px #ff0055, 0 0 120px 60px #ff4d6d;
            border-radius: 5px;
            animation: pulseCore 2s infinite alternate ease-in-out;
            z-index: 5;
        }
        .galaxy-core::before, .galaxy-core::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: #ff0055;
            border-radius: 50%;
        }
        .galaxy-core::before { left: -50px; }
        .galaxy-core::after { top: -50px; }

        @keyframes pulseCore {
            0% { transform: rotate(45deg) scale(0.9); opacity: 0.8; }
            100% { transform: rotate(45deg) scale(1.1); opacity: 1; box-shadow: 0 0 80px 40px #ff0055, 0 0 150px 80px #ff758f; }
        }

        /* حلقة المجرة الدوارة */
        .galaxy-spiral {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            transform-style: preserve-3d;
            transform: rotateX(65deg) rotateY(-15deg);
            animation: spinGalaxy 25s linear infinite;
        }

        @keyframes spinGalaxy {
            0% { transform: rotateX(65deg) rotateY(-15deg) rotateZ(0deg); }
            100% { transform: rotateX(65deg) rotateY(-15deg) rotateZ(-360deg); }
        }

        /* العناصر الطائرة (النجوم والكلمات) */
        .cosmic-item {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            white-space: nowrap;
            color: #fff;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
            font-weight: 900;
            opacity: 0.85;
        }

        /* كارت الرسالة المنبثق في الأمام */
        .message-card {
            position: absolute;
            background: rgba(10, 0, 20, 0.75);
            border: 2px solid #ff4d6d;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 0, 85, 0.3);
            max-width: 340px;
            width: 85%;
            z-index: 10;
            animation: floatCard 4s infinite alternate ease-in-out;
            border-top-right-radius: 0; /* لمسة جمالية زي الفيديو */
        }

        @keyframes floatCard {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-15px); }
        }

        .message-card h1 {
            color: #ff4d6d;
            font-family: 'Reem Kufi', sans-serif;
            font-size: 24px;
            margin-bottom: 15px;
        }

        .message-card p {
            font-size: 15px;
            line-height: 1.7;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        .message-card .btn {
            background: linear-gradient(45deg, #d90429, #ff4d6d);
            color: white;
            border: none;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
        }

        .message-card .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        /* الموسيقى المخفية */
        audio { display: none; }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://archive.org/download/amrdiab_202209/AmrDiab-AgmalEyoun.mp3" type="audio/mpeg">
    </audio>

    <div class="universe">
        <div class="galaxy-core"></div>

        <div class="galaxy-spiral" id="spiral"></div>

        <div class="message-card" id="card">
            <h1>مجرّة حبّنا السحرية ✨</h1>
            <p id="card-text">كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖🌌</p>
            <button class="btn" id="next-btn">اضغطي لرؤية المزيد 🚀</button>
        </div>
    </div>

    <script>
        const spiral = document.getElementById('spiral');
        const nextBtn = document.getElementById('next-btn');
        const cardText = document.getElementById('card-text');
        const music = document.getElementById('bg-music');

        // قائمة العبارات والنجوم والقلوب اللي هتلف في الفضاء حوالين القلب الكبير
        const words = [
            "بحبك", "ملوكتي 👑", "حياتي", "يا أجمل عيون", "أنتِ كوني", "فراشتي 🦋", 
            "وتيني", "عشقي", "✨", "💖", "⭐", "❤️", "قمر دنيتي", "أميرتي", "دنيتي كلها",
            "بحبك", "ملوكتي 👑", "حياتي", "✨", "💖", "⭐", "❤️"
        ];

        // توزيع الكلمات بشكل دائري ثلاثي الأبعاد جوة المجرة عشان تدي نفس أنيميشن الفيديو بالظبط
        words.forEach((word, index) => {
            const item = document.createElement('div');
            item.classList.add('cosmic-item');
            item.innerText = word;

            // حسابات الزوايا والمسافات الدائرية (نصف قطر مختلف لكل كلمة عشان نعمل شكل الحلزوني)
            const angle = (index / words.length) * Math.PI * 2;
            const radius = 120 + (index * 10); // كل كلمة تبعد شوية عن اللي قبلها

            const x = Math.cos(angle) * radius;
            const y = Math.sin(angle) * radius;
            
            // جعل الكلمات واقفة عمودياً وموزعة في البعد الثالث عشان لما تلف تدي عمق
            item.style.transform = `translate3d(${x}px, ${y}px, 0px) rotateZ(${-angle * 180 / Math.PI}px)`;
            
            // عشوائية في حجم الخط علشان التأثير الفضائي
            item.style.fontSize = `${12 + Math.random() * 12}px`;
            
            spiral.appendChild(item);
        });

        // تشغيل الموسيقى أول ما يضغطوا على الزرار والتحكم في الرسائل زي الفيديو
        let step = 0;
        nextBtn.addEventListener('click', () => {
            // تشغيل الصوت في أول ضغطة
            if(music.paused) {
                music.play().then(() => {
                    music.currentTime = 120; // يبدأ من المقطع الجميل علطول
                }).catch(e => console.log("الصوت محتاج تفاعل"));
            }

            step++;
            if (step === 1) {
                cardText.innerHTML = "في كل ركن في المجرة دي، وفى كل نبضة من نبضات قلبي، مفيش غير اسمك أنتِ وبس يا ملوكتي.. ربنا يخليكي ليا يا أحلى عيون في الكون! 💕🦋";
                nextBtn.innerText = "عالمنا الخاص 👑";
            } else if (step === 2) {
                cardText.innerHTML = "مهما لفيت الدنيا ومهما شفت نجوم، هتفضلي أنتِ النجمة الوحيدة اللي منورة سمايا ومخلية دنيتي كلها حب وسعادة.. بعشقك لآخر يوم في عمري! ✨❤️";
                nextBtn.innerText = "إعادة الرحلة 🔄";
                step = -1; // يرجع يعيد من الأول
            } else {
                cardText.innerHTML = "كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖🌌";
                nextBtn.innerText = "اضغطي لرؤية المزيد 🚀";
                step = 0;
            }
        });
    </script>
</body>
</html>
