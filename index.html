<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Galaxia de Amor | مجرة الحب العالمية 🌌💖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght=600;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Cairo', sans-serif;
        }

        /* حاوية الـ 3D الحقيقية */
        #canvas-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* كارت الرسالة الفخم المتناسق */
        .interface-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 380px;
            background: rgba(5, 2, 12, 0.8);
            border: 1px solid rgba(255, 0, 85, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 24px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 0, 85, 0.25);
            z-index: 10;
            animation: floatCard 4s infinite alternate ease-in-out;
            border-top-right-radius: 0;
        }

        @keyframes floatCard {
            0% { transform: translate(-50%, 0px); }
            100% { transform: translate(-50%, -10px); }
        }

        .interface-container h1 {
            color: #ff4d6d;
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
        }

        .interface-container p {
            font-size: 15px;
            line-height: 1.7;
            color: #f0f0f0;
            margin-bottom: 20px;
            min-height: 75px;
            transition: opacity 0.4s ease;
        }

        .action-btn {
            background: linear-gradient(135deg, #ff0055, #d90429);
            color: #fff;
            border: none;
            padding: 14px 0;
            width: 85%;
            font-size: 15px;
            font-weight: bold;
            font-family: 'Cairo', sans-serif;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 0, 85, 0.4);
            transition: transform 0.2s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        audio { display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="interface-container">
        <h1 id="card-title">مجرّة ملوكة السحرية 🌌</h1>
        <p id="card-text">كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖</p>
        <button class="action-btn" id="next-btn" onclick="nextStep()">استكشاف البُعد التالي 🚀</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="https://archive.org/download/amrdiab_202209/AmrDiab-AgmalEyoun.mp3" type="audio/mpeg">
    </audio>

    <script>
        let scene, camera, renderer, starParticles, galaxySpiral;
        const container = document.getElementById('canvas-container');
        const music = document.getElementById('bg-music');

        // 1. إعداد الكون الافتراضي ثلاثي الأبعاد
        function initThree() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.0015);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.z = 400;
            camera.position.y = 150;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            // إضافة النجوم العشوائية في الخلفية
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2500;
            const starPositions = new Float32Array(starsCount * 3);

            for(let i=0; i < starsCount * 3; i++) {
                starPositions[i] = (Math.random() - 0.5) * 1500;
            }
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1.5, transparent: true });
            starParticles = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starParticles);

            // بناء مجرة الدوامة التفاعلية
            build3DGalaxy();

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // 2. هندسة الدوامة الحلزونية الاحترافية
        function build3DGalaxy() {
            galaxySpiral = new THREE.Group();
            const particleCount = 1000;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            const color1 = new THREE.Color('#ff0055');
            const color2 = new THREE.Color('#7209b7');

            for (let i = 0; i < particleCount; i++) {
                const r = (i / particleCount) * 250;
                const theta = i * 0.15;

                const x = Math.cos(theta) * r + (Math.random() - 0.5) * 20;
                const y = (Math.random() - 0.5) * 15;
                const z = Math.sin(theta) * r + (Math.random() - 0.5) * 20;

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;

                const mixedColor = color1.clone().lerp(color2, Math.random());
                colors[i * 3] = mixedColor.r;
                colors[i * 3 + 1] = mixedColor.g;
                colors[i * 3 + 2] = mixedColor.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 3.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            const points = new THREE.Points(geometry, material);
            galaxySpiral.add(points);
            scene.add(galaxySpiral);
        }

        // 3. أنيميشن الحركة اللانهائية والكاميرا السينمائية
        function animate() {
            requestAnimationFrame(animate);

            // حركة دوامة المجرة والنجوم
            if(galaxySpiral) galaxySpiral.rotation.y -= 0.003;
            if(starParticles) starParticles.rotation.y += 0.0005;

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 4. نظام التحكم بالخطوات والتنقل الفضائي الديناميكي
        let currentStep = 0;
        function nextStep() {
            if(music.paused) {
                music.play().then(() => { music.currentTime = 120; }).catch(e => {});
            }

            currentStep++;
            const textEl = document.getElementById('card-text');
            const titleEl = document.getElementById('card-title');
            const btnEl = document.getElementById('next-btn');

            textEl.style.opacity = 0;

            setTimeout(() => {
                if (currentStep === 1) {
                    titleEl.innerText = "كوكب العيون الأجمل 🔮";
                    textEl.innerHTML = "في كل ركن في المجرة دي، وفي كل نبضة من نبضات قلبي، مفيش غير اسمك وبس.. ربنا يخليكي ليا يا أحلى عيون في الكون كله! 💕🦋";
                    btnEl.innerText = "التحليق لسديم العشق 🌌";
                    
                    // تحريك الكاميرا لمشهد وزاوية جديدة تماماً
                    camera.position.set(0, 300, 100);
                    camera.lookAt(0,0,0);
                } else if (currentStep === 2) {
                    titleEl.innerText = "نجمة سمايا الوحيدة 💎";
                    textEl.innerHTML = "مهما لفيت الدنيا ومهما شفت نجوم، هيفضل مكانك فوق عالي ومنور دنيتي.. مخلية حياتي كلها حب وسعادة، بعشقك لآخر يوم في عمري! ✨❤️";
                    btnEl.innerText = "الوصول لمركز الكون 👑";
                    
                    camera.position.set(250, 80, 250);
                    camera.lookAt(0,0,0);
                } else {
                    titleEl.innerText = "مجرّة ملوكة السحرية 🌌";
                    textEl.innerHTML = "كل ثانية بتمر وأنتِ معايا، بحس إن الكون كله بيلف حوالينا.. أنتِ مش بس ملكة قلبي، أنتِ المجرة والكون بتاعي كله! 💖";
                    btnEl.innerText = "استكشاف البُعد التالي 🚀";
                    
                    camera.position.set(0, 150, 400);
                    camera.lookAt(0,0,0);
                    currentStep = 0;
                }
                textEl.style.opacity = 1;
            }, 400);
        }

        // تشغيل كل شيء عند فتح الصفحة
        window.onload = initThree;
    </script>
</body>
</html>
